<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8"/>
    <title>Torino 1878 - Ferro e Sangue</title>
    <link rel="stylesheet" href="https://d1a3f4spazzrp4.cloudfront.net/kepler.gl/uber-fonts/4.0.0/superfine.css">
    <link href="https://unpkg.com/kepler.gl@3.0.0/umd/keplergl.min.css" rel="stylesheet">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
    
    <script src="https://unpkg.com/react@16.14.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@16.14.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/redux@4.1.2/dist/redux.min.js"></script>
    <script src="https://unpkg.com/react-redux@7.2.6/dist/react-redux.min.js"></script>
    <script src="https://unpkg.com/styled-components@4.4.1/dist/styled-components.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/kepler.gl@3.0.0/umd/keplergl.min.js"></script>

    <style>body{margin:0;overflow:hidden}#app{width:100vw;height:100vh}</style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const store = Redux.createStore(
        Redux.combineReducers({keplerGl: KeplerGl.keplerGlReducer}),
        {},
        Redux.applyMiddleware(KeplerGl.taskMiddleware)
      );

      const App = ReactRedux.connect(s=>s)(props => 
        React.createElement(KeplerGl.KeplerGl, {
          mapboxApiAccessToken: 'no-token',
          id: "map",
          width: window.innerWidth,
          height: window.innerHeight,
          mapLibreGL: window.maplibregl
        })
      );

      ReactDOM.render(
        React.createElement(ReactRedux.Provider, {store}, React.createElement(App)),
        document.getElementById('app')
      );

      const datasets = [{
        version: "v1",
        data: {
          id: "torino_1878",
          label: "Dati Milton",
          fields: [
            {name: "nome", type: "string"},
            {name: "tipo", type: "string"},
            {name: "lat", type: "real"},
            {name: "lng", type: "real"},
            {name: "info", type: "string"}
          ],
          rows: [
            ["Barriera di Milano", "Barriera", 45.0935, 7.6915, "Zona calda della mala."],
            ["Cascina Fossata", "Covo", 45.0940, 7.6850, "Banda del Rasoio."],
            ["Scontro Sangue", "Evento", 45.0950, 7.6880, "Battaglia Barabba."],
            ["Fabbrica Lanza", "Lavoro", 45.0485, 7.6755, "Candele e sudore."],
            ["Osteria Malora", "Piola", 45.0720, 7.6810, "Base operativa."],
            ["Agguato Cigna", "Evento", 45.0800, 7.6780, "Cronaca nera."]
          ]
        }
      }];

      const config = {
        version: "v1",
        config: {
          visState: {
            layers: [{
              id: "punti_layer",
              type: "point",
              config: {
                dataId: "torino_1878",
                columns: {lat: "lat", lng: "lng"},
                visConfig: {
                  radius: 30, // Punti belli grandi
                  opacity: 0.8,
                  colorRange: {
                    colors: ["#d90429", "#50727B", "#b7410e", "#2E4F4F", "#C27664"]
                  }
                },
                colorField: {name: "tipo", type: "string"}
              }
            }]
          },
          mapStyle: {
            styleType: "rabbini",
            mapStyles: {
              rabbini: {
                id: "rabbini",
                url: "https://gist.githubusercontent.com/mbrg7/c6b3288ad7ef47308bd799a101e6bb16/raw/686f2f5f2f836f1c60111305249a65c3598175a0/mappa.json"
              }
            }
          }
        }
      };

      setTimeout(() => {
        store.dispatch(KeplerGl.addDataToMap({datasets, config}));
      }, 500);
    </script>
  </body>
</html>
