<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Torino 1878 - Ferro e Sangue</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .legend { position: absolute; bottom: 30px; right: 30px; background: white; padding: 15px; font-family: Georgia, serif; border: 2px solid #b7410e; border-radius: 8px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="legend">
        <strong style="font-size: 1.2em;">Torino 1878</strong><br>
        <hr style="border: 0.5px solid #eee;">
        <span style="color:#b7410e; font-size: 1.5em;">—</span> Cinta Daziaria<br>
        <span style="color:#50727B; font-size: 1.5em;">●</span> Luoghi Milton
    </div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://gist.githubusercontent.com/mbrg7/c6b3288ad7ef47308bd799a101e6bb16/raw/686f2f5f2f836f1c60111305249a65c3598175a0/mappa.json',
            center: [7.68, 45.07], 
            zoom: 13.5
        });

        map.on('load', () => {
            // LAYER CINTA DAZIARIA
            map.addSource('cinta', {
                'type': 'geojson',
                'data': {
                    'type': 'Feature',
                    'geometry': {"type":"Polygon","coordinates":[[[7.683,45.046],[7.6755,45.0485],[7.662,45.045],[7.6545,45.0515],[7.651,45.0575],[7.6555,45.0755],[7.66,45.083],[7.675,45.091],[7.6915,45.0935],[7.6985,45.0845],[7.705,45.074],[7.6955,45.0645],[7.691,45.0595],[7.683,45.046]]]}
                }
            });

            map.addLayer({
                'id': 'cinta-fill',
                'type': 'fill',
                'source': 'cinta',
                'paint': { 'fill-color': '#b7410e', 'fill-opacity': 0.1 }
            });

            map.addLayer({
                'id': 'cinta-outline',
                'type': 'line',
                'source': 'cinta',
                'paint': { 'line-color': '#b7410e', 'line-width': 3 }
            });

            // LAYER PUNTI (LUOGHI)
            map.addSource('punti', {
                'type': 'geojson',
                'data': {
                    'type': 'FeatureCollection',
                    'features': [
                        { 'type': 'Feature', 'geometry': { 'type': 'Point', 'coordinates': [7.6755, 45.0485] }, 'properties': { 'title': 'Fabbrica Lanza' } },
                        { 'type': 'Feature', 'geometry': { 'type': 'Point', 'coordinates': [7.685, 45.094] }, 'properties': { 'title': 'Cascina Fossata' } },
                        { 'type': 'Feature', 'geometry': { 'type': 'Point', 'coordinates': [7.675, 45.048] }, 'properties': { 'title': 'Piola Gatto Nero' } },
                        { 'type': 'Feature', 'geometry': { 'type': 'Point', 'coordinates': [7.681, 45.072] }, 'properties': { 'title': 'Osteria Malora' } }
                    ]
                }
            });

            map.addLayer({
                'id': 'punti-circles',
                'type': 'circle',
                'source': 'punti',
                'paint': { 
                    'circle-radius': 8, 
                    'circle-color': '#50727B', 
                    'circle-stroke-width': 2, 
                    'circle-stroke-color': '#ffffff' 
                }
            });

            // Etichette al passaggio del mouse
            map.on('click', 'punti-circles', (e) => {
                new maplibregl.Popup()
                    .setLngLat(e.features[0].geometry.coordinates)
                    .setHTML('<strong>' + e.features[0].properties.title + '</strong>')
                    .addTo(map);
            });
        });
    </script>
</body>
</html>
