<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8"/>
    <title>Torino 1878 - Ferro e Sangue (Kepler.gl)</title>
    <link rel="stylesheet" href="https://d1a3f4spazzrp4.cloudfront.net/kepler.gl/uber-fonts/4.0.0/superfine.css">
    <link href="https://unpkg.com/kepler.gl@3.0.0/umd/keplergl.min.css" rel="stylesheet">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
    
    <script src="https://unpkg.com/react@16.14.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@16.14.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/redux@4.1.2/dist/redux.min.js"></script>
    <script src="https://unpkg.com/react-redux@7.2.6/dist/react-redux.min.js"></script>
    <script src="https://unpkg.com/styled-components@4.4.1/dist/styled-components.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/kepler.gl@3.0.0/umd/keplergl.min.js"></script>

    <style type="text/css">
      body {margin: 0; padding: 0; overflow: hidden;}
      #app {width: 100vw; height: 100vh;}
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="text/javascript">
      const MAPBOX_TOKEN = 'no-token'; 
      const reducers = (function createReducers(redux, keplerGl) {
        return redux.combineReducers({ keplerGl: keplerGl.keplerGlReducer });
      }(Redux, KeplerGl));

      const store = Redux.createStore(reducers, {}, Redux.applyMiddleware(KeplerGl.taskMiddleware));

      const App = (function createComponent(React, Redux, KeplerGl) {
        return Redux.connect(state => state)(function(props) {
          return React.createElement('div', {style: {position: 'absolute', width: '100%', height: '100%'}},
            React.createElement(KeplerGl.KeplerGl, {
              mapboxApiAccessToken: MAPBOX_TOKEN,
              id: "map",
              width: window.innerWidth,
              height: window.innerHeight,
              mapLibreGL: window.maplibregl
            })
          );
        });
      }(React, ReactRedux, KeplerGl));

      ReactDOM.render(React.createElement(ReactRedux.Provider, {store}, React.createElement(App)), document.getElementById('app'));

      const datasets = [
        {
          version: "v1",
          data: {
            id: "mappa_milton",
            label: "Torino 1878 - Ferro e Sangue",
            fields: [
              {name: "nome", type: "string"},
              {name: "tipo", type: "string"},
              {name: "lat", type: "real"},
              {name: "lng", type: "real"},
              {name: "descrizione", type: "string"}
            ],
            rows: [
              ["Barriera di Milano", "Barriera", 45.0935, 7.6915, "Cuore della malavita."],
              ["Barriera di Nizza", "Barriera", 45.0485, 7.6755, "Passaggio carrettieri."],
              ["Cascina Fossata", "Cascina", 45.0940, 7.6850, "Covo Banda del Rasoio."],
              ["Fabbrica Lanza", "Fabbrica", 45.0485, 7.6755, "Produzione candele."],
              ["Scontro alla Fossata", "Evento Sangue", 45.0950, 7.6880, "Battaglia campale Barabba."],
              ["Agguato via Cigna", "Evento Sangue", 45.0800, 7.6780, "Regolamento di conti."],
              ["Osteria della Malora", "Piola", 45.0720, 7.6810, "Base di Milton."]
            ]
          }
        }
      ];

      const config = {
        version: "v1",
        config: {
          mapStyle: {
            styleType: "rabbini",
            mapStyles: {
              rabbini: {
                id: "rabbini",
                label: "Mappa Rabbini 1878",
                url: "https://gist.githubusercontent.com/mbrg7/c6b3288ad7ef47308bd799a101e6bb16/raw/686f2f5f2f836f1c60111305249a65c3598175a0/mappa.json"
              }
            }
          },
          visState: {
            layers: [{
              id: "layer_punti",
              type: "point",
              config: {
                dataId: "mappa_milton",
                columns: {lat: "lat", lng: "lng"},
                isVisible: true,
                visConfig: { radius: 20, fixedRadius: false, opacity: 0.8 },
                colorConfig: {
                  colorField: {name: "tipo", type: "string"},
                  colorRange: {
                    colors: ["#b7410e", "#50727B", "#d90429", "#2E4F4F", "#C27664"]
                  }
                }
              }
            }]
          }
        }
      };

      window.addEventListener('load', () => {
        store.dispatch(KeplerGl.addDataToMap({ datasets, config }));
      });
    </script>
  </body>
</html>
